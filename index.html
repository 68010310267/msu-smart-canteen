<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSU Smart Canteen</title>

<style>
body{font-family:Arial;margin:0;background:#f2f2f2;}
header{background:#f7c948;padding:15px;text-align:center;font-size:22px;font-weight:bold;color:#333;}
.container{padding:15px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 3px 8px rgba(0,0,0,0.1);}
.hidden{display:none;}
button{background:#555;color:white;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;}
button:hover{background:#333;}
.primary{background:#f7c948;color:#333;width:100%;padding:10px;margin-top:10px;font-weight:bold;}
.menu-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.qty-controls button{padding:3px 8px;margin:0 3px;}
.total{font-weight:bold;font-size:18px;margin-top:10px;}
select,input{width:100%;padding:8px;margin-top:8px;border-radius:6px;border:1px solid #ccc;}
</style>
</head>
<body>

<header>🍽 MSU Smart Canteen</header>

<div class="container">

<div id="tablePage" class="card">
<h3>กรอกเลขโต๊ะ (1-70)</h3>
<input type="number" id="tableNumber">
<button class="primary" onclick="startOrder()">เริ่มสั่งอาหาร</button>
</div>

<div id="menuPage" class="hidden">

<div class="card">
<h3>โต๊ะ: <span id="showTable"></span></h3>

<h4>เลือกร้านอาหาร (1-16)</h4>
<select id="restaurantSelect">
<option>ร้านที่ 1 ข้าวตามสั่ง</option>
<option>ร้านที่ 2 ก๋วยเตี๋ยว</option>
<option>ร้านที่ 3 ผัดไทย</option>
<option>ร้านที่ 4 อาหารอีสาน</option>
<option>ร้านที่ 5 ข้าวมันไก่</option>
<option>ร้านที่ 6 สเต็ก</option>
<option>ร้านที่ 7 ชานม</option>
<option>ร้านที่ 8 น้ำผลไม้</option>
<option>ร้านที่ 9 ของหวาน</option>
<option>ร้านที่ 10 โรตี</option>
<option>ร้านที่ 11 เบเกอรี่</option>
<option>ร้านที่ 12 หมูกระทะ</option>
<option>ร้านที่ 13 ซูชิ</option>
<option>ร้านที่ 14 อาหารคลีน</option>
<option>ร้านที่ 15 ข้าวแกง</option>
<option>ร้านที่ 16 อาหารใต้</option>
</select>
</div>

<div class="card">
<h3>เมนู</h3>

<div class="menu-row">
<span>ข้าวผัด - 50</span>
<div class="qty-controls">
<button onclick="changeQty('ข้าวผัด',50,-1)">-</button>
<span id="qty-ข้าวผัด">0</span>
<button onclick="changeQty('ข้าวผัด',50,1)">+</button>
</div>
</div>

<div class="menu-row">
<span>กะเพราไก่ - 55</span>
<div class="qty-controls">
<button onclick="changeQty('กะเพราไก่',55,-1)">-</button>
<span id="qty-กะเพราไก่">0</span>
<button onclick="changeQty('กะเพราไก่',55,1)">+</button>
</div>
</div>

<div class="menu-row">
<span>ชาเย็น - 25</span>
<div class="qty-controls">
<button onclick="changeQty('ชาเย็น',25,-1)">-</button>
<span id="qty-ชาเย็น">0</span>
<button onclick="changeQty('ชาเย็น',25,1)">+</button>
</div>
</div>

</div>

<div class="card">
<h3>🛒 ตะกร้า</h3>
<div id="cartList"></div>
<div class="total">รวม: <span id="total">0</span> บาท</div>
<button class="primary" onclick="pay()">ชำระเงิน</button>
</div>

</div>
</div>

<script>
let cart = {};
let total = 0;
let tableNumber = 0;

function startOrder(){
let t=document.getElementById("tableNumber").value;
if(t>=1 && t<=70){
tableNumber=t;
document.getElementById("showTable").innerText=t;
document.getElementById("tablePage").classList.add("hidden");
document.getElementById("menuPage").classList.remove("hidden");
}else{alert("กรอกเลขโต๊ะ 1-70");}
}

function changeQty(name,price,delta){
if(!cart[name]) cart[name]={qty:0,price:price};
cart[name].qty+=delta;
if(cart[name].qty<0) cart[name].qty=0;
updateCart();
}

function updateCart(){
total=0;
let html="";
for(let item in cart){
if(cart[item].qty>0){
let sub=cart[item].qty*cart[item].price;
total+=sub;
html+=item+" x "+cart[item].qty+" = "+sub+" บาท<br>";
}
document.getElementById("qty-"+item).innerText=cart[item].qty;
}
document.getElementById("cartList").innerHTML=html;
document.getElementById("total").innerText=total;
}

function pay(){
if(total===0){alert("ยังไม่มีสินค้าในตะกร้า");return;}
let shop=document.getElementById("restaurantSelect").value;
alert("ชำระเงินสำเร็จ 🎉\nโต๊ะ "+tableNumber+"\n"+shop+"\nยอด "+total+" บาท");
location.reload();
}
</script>

</body>
</html>
