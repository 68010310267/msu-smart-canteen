<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSU Canteen - เลือกโต๊ะและชำระเงิน</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f7fa;
    text-align:center;
    margin:0;
    padding:0;
}

.container{
    max-width:500px;
    margin:40px auto;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h1{
    color:#2c3e50;
}

select, input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#27ae60;
    color:white;
    padding:12px;
    border:none;
    border-radius:8px;
    width:100%;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#219150;
}

.qr-section{
    display:none;
    margin-top:20px;
}

.qr-section img{
    width:250px;
    border-radius:10px;
}

.success{
    color:green;
    font-weight:bold;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>จองโต๊ะ MSU Canteen</h1>

    <label>เลือกโต๊ะ (1-70)</label>
    <select id="tableNumber">
        <option value="">-- เลือกโต๊ะ --</option>
        <script>
            for(let i=1;i<=70;i++){
                document.write(`<option value="${i}">โต๊ะที่ ${i}</option>`);
            }
        </script>
    </select>

    <input type="text" id="customerName" placeholder="กรอกชื่อผู้จอง">

    <input type="number" id="amount" placeholder="จำนวนเงิน (บาท)">

    <button onclick="showQR()">ชำระเงินออนไลน์</button>

    <div class="qr-section" id="qrSection">
        <h3>สแกน QR เพื่อชำระเงิน</h3>

        <!-- 🔥 ใส่รูป QR เดิมของเฟรชตรงนี้ -->
        <img src="qr.png" alt="PromptPay QR">

        <p>โอนเสร็จแล้วกดปุ่มยืนยัน</p>

        <button onclick="confirmPayment()">ยืนยันว่าโอนแล้ว</button>

        <div id="successMessage" class="success"></div>
    </div>

</div>

<script>
function showQR(){
    let table = document.getElementById("tableNumber").value;
    let name = document.getElementById("customerName").value;
    let amount = document.getElementById("amount").value;

    if(table === "" || name === "" || amount === ""){
        alert("กรุณากรอกข้อมูลให้ครบ");
        return;
    }

    document.getElementById("qrSection").style.display = "block";
}

function confirmPayment(){
    document.getElementById("successMessage").innerHTML =
        "✅ ระบบได้รับแจ้งการโอนแล้ว กรุณารอการตรวจสอบ";
}
</script>

</body>
</html>
