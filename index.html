<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MSU Smart Canteen</title>

<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f2f2f2;
}

header{
background:#f7c948;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#333;
}

.container{
padding:20px;
}

.hidden{
display:none;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
box-shadow:0 3px 8px rgba(0,0,0,0.1);
}

.menu-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

button{
background:#555;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

.primary-btn{
background:#f7c948;
color:#333;
width:100%;
padding:10px;
font-weight:bold;
margin-top:10px;
}

.total{
font-weight:bold;
font-size:18px;
margin-top:10px;
}
input{
width:100%;
padding:8px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>
<body>

<header>🍽 MSU Smart Canteen</header>

<div class="container">

<!-- หน้าเลือกโต๊ะ -->
<div id="tablePage" class="card">
<h3>กรอกเลขโต๊ะ (1-70)</h3>
<input type="number" id="tableNumber" placeholder="ใส่เลขโต๊ะ">
<button class="primary-btn" onclick="startOrder()">เริ่มสั่งอาหาร</button>
</div>

<!-- หน้าเมนู -->
<div id="menuPage" class="hidden">

<div class="card">
<h3>โต๊ะ: <span id="showTable"></span></h3>
</div>

<div class="card">
<h3>เลือกเมนูอาหาร</h3>

<div class="menu-item">
<span>ข้าวผัด - 50 บาท</span>
<button onclick="addItem('ข้าวผัด',50)">เพิ่ม</button>
</div>

<div class="menu-item">
<span>กะเพราไก่ - 55 บาท</span>
<button onclick="addItem('กะเพราไก่',55)">เพิ่ม</button>
</div>

<div class="menu-item">
<span>ผัดไทย - 60 บาท</span>
<button onclick="addItem('ผัดไทย',60)">เพิ่ม</button>
</div>

<div class="menu-item">
<span>ชาเย็น - 25 บาท</span>
<button onclick="addItem('ชาเย็น',25)">เพิ่ม</button>
</div>

<div class="menu-item">
<span>น้ำเปล่า - 15 บาท</span>
<button onclick="addItem('น้ำเปล่า',15)">เพิ่ม</button>
</div>

</div>

<div class="card">
<h3>🛒 ตะกร้าของคุณ</h3>
<div id="cartItems"></div>
<div class="total">รวม: <span id="total">0</span> บาท</div>
<button class="primary-btn" onclick="goToPayment()">ไปหน้าชำระเงิน</button>
</div>

</div>

<!-- หน้าชำระเงิน -->
<div id="paymentPage" class="hidden">
<div class="card">
<h3>💳 ชำระเงิน</h3>
<p>โต๊ะ: <span id="paymentTable"></span></p>
<div id="paymentSummary"></div>
<div class="total">ยอดรวมทั้งหมด: <span id="paymentTotal"></span> บาท</div>
<button class="primary-btn" onclick="confirmPayment()">ยืนยันการชำระเงิน</button>
</div>
</div>

</div>

<script>
let total = 0;
let cart = [];
let tableNumber = 0;

function startOrder(){
let table = document.getElementById("tableNumber").value;
if(table >=1 && table <=70){
tableNumber = table;
document.getElementById("showTable").innerText = table;
document.getElementById("tablePage").classList.add("hidden");
document.getElementById("menuPage").classList.remove("hidden");
}else{
alert("กรุณากรอกเลขโต๊ะ 1-70");
}
}

function addItem(name,price){
cart.push({name:name,price:price});
total += price;
document.getElementById("cartItems").innerHTML += name + " - " + price + " บาท<br>";
document.getElementById("total").innerText = total;
}

function goToPayment(){
if(total === 0){
alert("กรุณาเลือกอาหารก่อน");
return;
}
document.getElementById("menuPage").classList.add("hidden");
document.getElementById("paymentPage").classList.remove("hidden");
document.getElementById("paymentTable").innerText = tableNumber;

let summary = "";
cart.forEach(item=>{
summary += item.name + " - " + item.price + " บาท<br>";
});
document.getElementById("paymentSummary").innerHTML = summary;
document.getElementById("paymentTotal").innerText = total;
}

function confirmPayment(){
alert("ชำระเงินสำเร็จ 🎉\nโต๊ะ " + tableNumber + "\nยอด " + total + " บาท");
location.reload();
}
</script>

</body>
</html>
